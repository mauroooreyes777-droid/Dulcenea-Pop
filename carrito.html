<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CARRITO | Dulcenea Pop</title>

    <link rel="stylesheet" href="CSS/carrito.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <header class="header-carrito">

        <a href="HTML/crayolas.html" class="volver">

            <i class="fa-solid fa-arrow-left"></i>

            Seguir comprando

        </a>

        <h1>Mi carrito 🛒</h1>

    </header>


    <!-- PRODUCTOS -->

    <section id="lista-carrito"></section>


    <!-- TOTAL -->

    <section class="footer-carrito">

        <div class="total">

            <h2>Total:</h2>

            <p id="total-precio">$0</p>

        </div>

        <button class="btn-whatsapp" onclick="abrirModal()">

            Finalizar pedido

        </button>

    </section>

    <div class="modal" id="modalPedido">

        <div class="modal-contenido">

            <span class="cerrar-modal" onclick="cerrarModal()">

                ✕

            </span>

            <h2>DATOS DE ENTREGA ✨</h2>

            <div class="campo">

                <label>Nombre</label>

                <input type="text" id="nombre">

            </div>

            <div class="campo">

                <label>Teléfono</label>

                <input type="text" id="telefono">

            </div>

            <div class="campo">

                <label>Dirección</label>

                <input type="text" id="direccion">

            </div>

            <div class="campo">

                <label>Referencias</label>

                <textarea id="referencias"></textarea>

            </div>

            <div class="campo">

                <label>Fecha de entrega</label>

                <input type="date" id="fecha">

            </div>

            <div class="campo">

                <label>Notas extras</label>

                <textarea id="notas"></textarea>

            </div>

            <button class="btn-enviar-modal" onclick="enviarWhatsApp()">

                Enviar pedido✨

            </button>

        </div>

    </div>


    <div id="toast" class="toast show"></div>
    <script src="JS/carrito-page.js"></script>

</body>

</html>
