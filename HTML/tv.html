<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ANIMALES | crayolas</title>
    <link rel="stylesheet" href="../CSS/tv.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<section class="productos">
    <div class="producto-horizontal">

        <div class="producto-img">
            <img src="../IMG-CRAYOLAS-TV/1-stitch.jpeg">
        </div>

        <div class="producto-info">

            <h2>STITCH</h2>

            <p class="precio">$20</p>

            <div class="kits">
                <p class="opcion" data-precio="65">Kit de 6 piezas + dibujo<b>$65</b></p>
                <p class="opcion" data-precio="45">Kit de 4 piezas + dibujo<b>$45</b></p>
                <p class="opcion" data-precio="30">Kit de 2 piezas + dibujo<b>$30</b></p>
            </div>

            <button class="btn-carrito" onclick="agregarAlCarrito(this)">
                Agregar al carrito
            </button>

        </div>

        <div class="producto-extra">
            <p class="titulo-extra">Mayoreo</p>
            <p>+10 kits</p>

            <p class="titulo-extra">Menudeo</p>
            <p>+$15 cada kit</p>

        </div>
    </div>

    <div class="producto-horizontal">

        <div class="producto-img">
            <img src="../IMG-CRAYOLAS-TV/2-k-pop-hunters.jpeg">
        </div>

        <div class="producto-info">

            <h2>Guerras<br>K-pop</h2>

            <p class="precio" id="precio-k-pop">$25</p>

            <div class="kits">
                <p>Selecciona tu kit:</p>
    
                <select class="selector-kit" onchange="actualizarPrecio(this)">
                    <option value="25">1 pieza - $25</option>
                    <option value="35">2 piezas - $35</option>
                    <option value="45">3 piezas - $45</option>
                    <option value="55">4 piezas - $55</option>
                    <option value="65">5 piezas - $65</option>
                    <option value="75">6 piezas - $75</option>
                    <option value="85">7 piezas - $85</option>
                </select>
            </div>
    
            <!-- BOTÓN -->
            <button class="btn-carrito" onclick="agregarAlCarrito(this)">
                Agregar al carrito
            </button>
    
        </div>
    
        <!-- EXTRA -->
        <div class="producto-extra">
            <p>Mayoreo</p>
            <p>+10 kits</p>
    
            <p>Menudeo</p>
            <p>+$15 cada kit</p>
        </div>
    
    </div>

    </div>
</section>

<script src="../JS/carrito.js"></script>
