<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tatuajes Personalizados</title>

    <!-- CSS -->

    <link rel="stylesheet" href="../CSS/tatuajes.css">

    <!-- ICONOS -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- FUENTE -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- =========================
BANNER TATUAJES POP
========================= -->

    <div class="banner-tatuajes">

        <img src="../IMGA/tataujes-pop-sinfondo.png" alt="Tatuajes Pop">

    </div>

    <div class="top-bar">

        <!-- SEGUIR COMPRANDO -->

        <a href="../HTML/menu.html" class="btn-seguir">

            <i class="fa-solid fa-arrow-left"></i>

            <span>Seguir comprando</span>

        </a>


        <!-- CARRITO -->

        <a href="../HTML/carrito.html" class="btn-carrito-top">

            <div class="cart-badge" id="contador-carrito">

                0

            </div>

            <i class="fa-solid fa-cart-shopping"></i>

        </a>

    </div>


    <!-- =========================
    SECTION
    ========================= -->

    <section class="tatuajes-section">


        <!-- =========================
        TITULO
        ========================= -->

        <div class="titulo-tatuajes">

            <h1>

                Tatuajes Temporales 💖

            </h1>

            <p>

                Sube tu diseño favorito y personaliza
                tus tatuajes kawaii ✨

            </p>

        </div>



        <!-- =========================
        CARD
        ========================= -->

        <div class="card-tatuajes">



            <!-- =========================
            IZQUIERDA
            ========================= -->

            <div class="preview-column">



                <!-- PREVIEW -->

                <div class="preview-box">

                    <img id="preview-img" src="../IMGA/logo-marca.jpeg">

                </div>



                <!-- UPLOAD -->

                <div class="upload-box">

                    <i class="fa-solid fa-cloud-arrow-up"></i>

                    <h3>

                        Sube tu imagen aquí

                    </h3>

                    <p>

                        PNG, JPG o WEBP 💖

                    </p>



                    <!-- INPUT -->

                    <input type="file" id="link-imagen" accept="image/*">



                    <!-- LABEL -->

                    <label for="link-imagen" class="label-upload">

                        <i class="fa-solid fa-folder-open"></i>

                        Elegir archivo

                    </label>

                </div>

            </div>





            <!-- =========================
            DERECHA
            ========================= -->

            <div class="form-tatuajes">



                <h2 class="form-titulo">

                    Personaliza tu pedido ✨

                </h2>



                <!-- TAMAÑO -->

                <label>

                    Tamaño 📏

                </label>

                <select id="tamano">

                    <option>Chico (5 cm)</option>

                    <option>Mediano (10 cm)</option>

                    <option>Grande (15 cm)</option>

                </select>



                <!-- CANTIDAD -->

                <label>

                    Cantidad 🌸

                </label>

                <div class="cantidad-box">

                    <button type="button" class="cantidad-btn" id="restar">

                        −

                    </button>

                    <input type="number" id="cantidad" min="1" value="1">

                    <button type="button" class="cantidad-btn" id="sumar">

                        +

                    </button>

                </div>



                <!-- NOTAS -->

                <label>

                    Notas ✨

                </label>

                <textarea id="notas" placeholder="Ej: estilo kawaii, colores pastel, detalles especiales..."></textarea>



                <!-- INFO -->

                <div class="info-box">

                    <strong>

                        💖 Importante

                    </strong>

                    <br><br>

                    La calidad de tu imagen influye
                    en el resultado final.

                    <br>

                    Usa imágenes claras y bonitas ✨

                </div>



                <!-- BOTON -->

                <button id="btn-tatuajes">

                    <i class="fa-solid fa-cart-shopping"></i>

                    Agregar al carrito 💕

                </button>

            </div>

        </div>

    </section>



    <!-- JS -->

    <script src="../JS/tatuajes.js"></script>

</body>

</html>
