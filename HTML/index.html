<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="home-page">
    <header class="main-header">
    
        <nav class="nav-menu">
    
            <div class="crayon-menu" id="menuButton">
                <span class="crayon-tip"></span>
                MENÚ
            </div>
    
            <div class="dropdown-menu" id="dropdownMenu">
    
                <a href="#">Productos</a>
                <a href="#">Promociones</a>
                <a href="#">Revendedores</a>
                <a href="#">Contacto</a>
    
            </div>
    
        </nav>
    
        <div class="cart">
            <i class="fa-solid fa-cart-shopping"></i>
        </div>
    
    </header>
    
    
    
    <section class="banner">
    
        <div class="banner-content">
    
            <h2 class="crayola-text">

                <span>¡H</span><span>O</span><span>L</span><span>A</span>
                <span> </span>
                <span>C</span><span>R</span><span>A</span><span>Y</span><span>O</span><span>L</span><span>A!</span>
            </h2>
    
            <p>¡Pequeños detalles que<br>pintan grandes <span>momentos</span>!</p>
    
            <button class="btn-entrar">Conoce todos nuestros productos</button>
        </div>
    
    </section>

    <hr class="divider"> 

    <section class="colecciones">

        <h2 class="titulo-seccion">
            Nuestras Colecciones
        </h2>

        <div class="slider-container">

            <div class="slider-box">

                <div class="card-cover">
                    <h3>crayolas</h3>
                </div>

                <img src="../IMGA/FONDODINDX.jpeg" class="slide active">
                <img src="../IMGA/FONDOINDEEXX.jpeg" class="slide">
                <img src="../IMGA/FONDOINDEX.jpeg" class="slide">
   
            </div>
            
            <div class="slider-box">

                <div class="card-cover">
                    <h3>tatuajes</h3>
                </div>

                <img src="../IMGA/FONDODINDX.jpeg" class="slide active">
                <img src="../IMGA/FONDOINDEEXX.jpeg" class="slide">
                <img src="../IMGA/FONDOINDEX.jpeg" class="slide">
      
            </div>

            <div class="slider-box">

                <div class="card-cover">
                    <h3>kits</h3>
                </div>

                <img src="../IMGA/FONDODINDX.jpeg" class="slide active">
                <img src="../IMGA/FONDOINDEEXX.jpeg" class="slide">
                <img src="../IMGA/FONDOINDEX.jpeg" class="slide">
    
            </div>

            <div class="slider-box">

                <div class="card-cover">
                    <h3>almohadas</h3>
                </div>

                <img src="../IMGA/FONDODINDX.jpeg" class="slide active">
                <img src="../IMGA/FONDOINDEEXX.jpeg" class="slide">
                <img src="../IMGA/FONDOINDEX.jpeg" class="slide">
    
            </div>
    
        </div>

    </section>


    <div class="postit-fixed" id="postit">
        <h3 id="postit-title">Más vendidos</h3>
        <p id="postit-text">Caja de crayolas + colores jumbo</p>
    </div>
    
<script src="../JS/index.js"></script>
</body>
</html>
