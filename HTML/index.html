<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="home-page">

    <header class="main-header">
        <div class="top-header">

            <div class="left">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div class="center">
                <img src="../IMGA/logo-indexx.jpeg">
            </div>

            <div class="right">
                <i class="fa-solid fa-user"></i>
                <i class="fa-solid fa-cart-shopping"></i>
            </div>

        </div>
      

    </header>
    
    <div class="linea-rosa">
        <nav class="nav-links">
            <a href="#">Inicio</a>
            <a href="#">CREAR</a>
            <a href="#">Menú</a>
            <a href="#">Promociones</a>
            <a href="#">Contacto</a>
        </nav>
    </div>

    
    <section class="banner">
    
        <div class="banner-content">
    
            <h2 class="crayola-text">

                <span>¡H</span><span>O</span><span>L</span><span>A</span>
                <span> </span>
                <span>C</span><span>R</span><span>A</span><span>Y</span><span>O</span><span>L</span><span>A!</span>
            </h2>
    
            <p>¡Pequeños detalles que<br>pintan grandes <span>momentos</span>!</p>
    
            <button class="btn-entrar">Conoce todos nuestros productos</button>
        </div>
    
    </section>

    <hr class="divider"> 

    <section class="colecciones">

        <h2 class="titulo-seccion">
            Nuestras Colecciones
        </h2>

        <div class="slider-container">

            <div class="slider-box">

                <div class="card-cover">
                    <h3>crayolas</h3>
                </div>

                <img src="../IMGA/FONDODINDX.jpeg" class="slide active">
                <img src="../IMGA/FONDOINDEEXX.jpeg" class="slide">
                <img src="../IMGA/FONDOINDEX.jpeg" class="slide">
   
            </div>
            
            <div class="slider-box">

                <div class="card-cover">
                    <h3>tatuajes</h3>
                </div>

                <img src="../IMGA/FONDODINDX.jpeg" class="slide active">
                <img src="../IMGA/FONDOINDEEXX.jpeg" class="slide">
                <img src="../IMGA/FONDOINDEX.jpeg" class="slide">
      
            </div>

            <div class="slider-box">

                <div class="card-cover">
                    <h3>kits</h3>
                </div>

                <img src="../IMGA/FONDODINDX.jpeg" class="slide active">
                <img src="../IMGA/FONDOINDEEXX.jpeg" class="slide">
                <img src="../IMGA/FONDOINDEX.jpeg" class="slide">
    
            </div>

            <div class="slider-box">

                <div class="card-cover">
                    <h3>almohadas</h3>
                </div>

                <img src="../IMGA/FONDODINDX.jpeg" class="slide active">
                <img src="../IMGA/FONDOINDEEXX.jpeg" class="slide">
                <img src="../IMGA/FONDOINDEX.jpeg" class="slide">
    
            </div>
    
        </div>

    </section>


    <div class="postit-fixed" id="postit">
        <h3 id="postit-title">Más vendidos</h3>
        <p id="postit-text">Caja de crayolas + colores jumbo</p>
    </div>
    
<script src="../JS/index.js"></script>
</body>
</html>
